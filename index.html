<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredients Inventory System</title>
</head>
<body>

    <section class="header">

        <div class="title">
            <h1>📋Shelf Life Tracker</h1>
            <p>Never waste ingredients again!</p>
        </div>

        <div class="counter">

            <div class="critical">
                <p>0</p>
                <p>CRITICAL</p>
            </div>

            <div class="warning">
                <p>0</p>
                <p>WARNING</p>
            </div>

            <div class="safe">
                <p>0</p>
                <p>SAFE</p>
            </div>

            <div class="total">
                <p>0</p>
                <p>TOTAL</p>
            </div>

        </div>



    </section>

    <section class="alerts">

        <div class="critical-alert"></div>
        <div class="warning-alert"></div>

    </section>

    <section class="add-ing">
        
        <div class="ing-name">
            <label>Ingredient Name:</p>
            <input type="text" placeholder="Ingredient Name">
        </div>

        <div class="ing-details">
            <input type="date" placeholder="Expiration Date">
            <input type="number" placeholder="Quantity">
        </div>

        <div class="add-button">
            <input type="button" value="+ ADD INGREDIENT">
        </div>

    </section>

    <section>
        <div class="inventory"></div>
    </section>


</body>
</html>
