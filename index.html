<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredients Inventory System</title>
    <link rel="shortcut icon" href="assets/fav-icon.png" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <section class="container">
        <div class="header">
            <div class="title">
                <img src="assets/logo.png" alt="logo">
                <h1>Shelf-Life Tracker</h1>
                <p>Never waste Ingredients again!</p>
            </div>
            <div class="stats">
                <div class="stat stat-critical">
                    <span class="stat-number" id="criticalCount">0</span>
                    <span class="stat-label">Critical</span>
                </div>
                <div class="stat stat-warning">
                    <span class="stat-number" id="warningCount">0</span>
                    <span class="stat-label">Warning</span>
                </div>
                <div class="stat stat-safe">
                    <span class="stat-number" id="safeCount">0</span>
                    <span class="stat-label">Safe</span>
                </div>
                <div class="stat stat-total">
                    <span class="stat-number" id="totalCount">0</span>
                    <span class="stat-label">Total</span>
                </div>
            </div>
        </div>
    </section>

    <section class="alerts">
        <div class="critical-alert"></div>
        <div class="warning-alert"></div>
    </section>

    <section class="ingredients">
        <form class="add-ing">
            <div class="ing-details">
                <label>Ingredient Name</label>
                <input type="text" placeholder="Sourdough, Flour, Butter..." required>
            </div>
            <div class="ing-details">
                <label>Expires On</label>
                <div class="date-input">
                    <input type="date" required>
                    <input type="number" placeholder="Qty (e.g., 2kg)">
                </div>
            </div>
            <button type="submit" class="btn">➕ Add Ingredient</button>
        </form>
    </section>

    <section>
        <div class="inventory"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
