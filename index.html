<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredients Inventory System</title>
    <link rel="shortcut icon" href="assets/fav-icon.png" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="title">
                <img src="assets/logo.png" alt="logo">
                <div class="title-text">
                    <h1>Shelf-Life Tracker</h1>
                    <p>Never waste Ingredients again!</p>
                </div>
            </div>
            <div class="stats">
                <div class="stat stat-critical">
                    <span class="stat-number" id="criticalCount">0</span>
                    <span class="stat-label">Critical</span>
                </div>
                <div class="stat stat-warning">
                    <span class="stat-number" id="warningCount">0</span>
                    <span class="stat-label">Warning</span>
                </div>
                <div class="stat stat-safe">
                    <span class="stat-number" id="safeCount">0</span>
                    <span class="stat-label">Safe</span>
                </div>
                <div class="stat stat-total">
                    <span class="stat-number" id="totalCount">0</span>
                    <span class="stat-label">Total</span>
                </div>
            </div>
        </div>

        <div class="warning-banner" id="warningBanner">
            🚨 <strong id="warningText"></strong>
        </div>
    
        <div class="card">
            <form id="addForm">
                <div class="form-group">
                    <label>Ingredient Name</label>
                    <input type="text" class="input-field" id="ingredientName" placeholder="Sourdough starter, Flour..." required>
                </div>
                <div class="form-group">
                    <label>Details</label>
                    <div class="date-input">
                        <input type="date" class="input-field" id="expirationDate" required>
                        <input type="text" class="input-field" id="quantity" placeholder="2kg, 500g...">
                    </div>
                </div>
                <button type="submit" class="btn">➕ Add Ingredient</button>
            </form>
        </div>

        <div class="glass-card full-height">
            <h3>Inventory</h3>
            <div class="inventory-list" id="inventoryList">
                
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
