<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelf-Life Tracker | Never waste ingredients again!</title>
    <link rel="shortcut icon" href="assets/fav-icon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="title">
                <img src="assets/logo.png" alt="logo">
                <div class="title-text">
                    <h1>Shelf-Life Tracker</h1>
                    <p>Never waste Ingredients again!</p>
                </div>
            </div>
            <div class="stats">
                <div class="stat stat-critical">
                    <span class="stat-number" id="criticalCount">0</span>
                    <span class="stat-label">Critical</span>
                </div>
                <div class="stat stat-warning">
                    <span class="stat-number" id="warningCount">0</span>
                    <span class="stat-label">Warning</span>
                </div>
                <div class="stat stat-safe">
                    <span class="stat-number" id="safeCount">0</span>
                    <span class="stat-label">Safe</span>
                </div>
                <div class="stat stat-total">
                    <span class="stat-number" id="totalCount">0</span>
                    <span class="stat-label">Total</span>
                </div>
            </div>
        </div>

        <div class="card warning-card">
            <div class="warning-banner" id="warningBanner">
                <strong id="warningText"></strong>
            </div>
        </div>
    
        <div class="card">
            <form id="addForm">
                <div class="form-group">
                    <label for="ingredientName">Ingredient Name</label>
                    <input type="text" class="input-field" id="ingredientName" placeholder="ex. Sourdough, Flour, Butter..." required>
                </div>

                <div class="date-input">
                    <div class="form-group">
                        <label for="expirationDate">Expiration Date</label>
                        <input type="date" class="input-field" id="expirationDate" required>
                    </div>
                
                    <div class="quantity-group">
                        <div class="form-group">
                            <label for="quantity">Amount</label>
                            <input type="number" class="input-field" id="quantity" min="0.01" step="0.01" placeholder="00.00" required >
                        </div>
                    
                        <div class="form-group">
                            <label for="unit">Unit</label>
                            <select class="input-field unit-select" id="unit" required>
                                <option value="" selected disabled>Select Unit</option>
                    
                                <optgroup label="Weight">
                                    <option value="kg">Kilograms (kg)</option>
                                    <option value="g">Grams (g)</option>
                                </optgroup>
                    
                                <optgroup label="Liquid">
                                    <option value="L">Liters (L)</option>
                                    <option value="mL">Milliliters (mL)</option>
                                </optgroup>
                    
                                <optgroup label="Pieces">
                                    <option value="pcs">Pieces (pcs)</option>
                                    <option value="dozen">Dozen (12 pcs)</option>
                                    <option value="tray">Tray</option>
                                </optgroup>
                    
                                <optgroup label="Packaging">
                                    <option value="bag">Bag</option>
                                    <option value="box">Box</option>
                                    <option value="pack">Pack</option>
                                    <option value="bottle">Bottle</option>
                                </optgroup>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn">
                    ➕ Add Ingredient
                </button>
            </form>
        </div>

        <div class="card full-height">
            <h3>Inventory</h3>
            <div class="inventory-list" id="inventoryList">
            </div>    
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
